name: Ad Traffic Bot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm install

    - name: Run Bot
      run: |
        # Puppeteer mate zaroori libraries install karva mate
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        node index.js
      env:
        SITE_URL: ${{ secrets.SITE_URL }}