name: Ad Traffic Bot

on:
  schedule:
    - cron: '0 * * * *' # Dar kalake automatic chalse
  workflow_dispatch:      # Manual run karva mate

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Run Bot
      run: node index.js
      env:
        SITE_URL: ${{ secrets.SITE_URL }}